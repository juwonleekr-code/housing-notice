name: Process Incoming Site JSON

on:
  push:
    paths:
      - 'incoming/*.json'

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.HOUSING_NOTICE_DEPLOY }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Process incoming JSON files
        run: python scripts/process_incoming.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git add -A
          git diff --staged --quiet || git commit -m "auto: $(date +'%Y-%m-%d') 신규 현장 추가"
          git push https://x-access-token:${{ secrets.HOUSING_NOTICE_DEPLOY }}@github.com/juwonleekr-code/housing-notice.git
