<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현장 상세 — PF 심사 DB</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
:root{
  --bg:#fff; --section:#f5f5f7; --ink:#1d1d1f; --sub:#6e6e73;
  --divider:#e5e5e7; --blue:#0071e3;
  --green:#34c759; --warn:#ff9f0a; --danger:#ff453a;
  --rc:18px; --rb:999px; --ri:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:16px;line-height:1.6}

.wrap{max-width:1040px;margin:0 auto;padding:0 24px}
@media(max-width:600px){.wrap{padding:0 16px}}

/* Header */
header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.88);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--divider)}
.hd-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
.back-btn{display:flex;align-items:center;gap:5px;color:var(--blue);font-size:15px;font-weight:500;cursor:pointer;background:none;border:none;font-family:inherit;padding:0;text-decoration:none;transition:opacity .15s}
.back-btn:hover{opacity:.7}
.hd-logo{font-size:14px;font-weight:700;color:var(--sub)}.hd-logo span{color:var(--blue)}

/* Hero */
.hero{background:var(--section);padding:52px 0 44px}
.hero-loc{font-size:13px;color:var(--sub);margin-bottom:8px;font-weight:500}
.hero-name{font-size:clamp(26px,4.5vw,40px);font-weight:700;letter-spacing:-.8px;line-height:1.2;margin-bottom:16px}
.hero-meta{display:flex;flex-wrap:wrap;gap:7px}
.badge{font-size:12px;font-weight:600;padding:5px 12px;border-radius:var(--rb);letter-spacing:.01em;white-space:nowrap;display:inline-block}
.b-blue{background:rgba(0,113,227,.08);color:var(--blue)}
.b-green{background:rgba(52,199,89,.1);color:#248a3d}
.b-warn{background:rgba(255,159,10,.1);color:#b86200}
.b-danger{background:rgba(255,69,58,.08);color:#c0392b}
.b-n{background:rgba(0,0,0,.06);color:var(--sub)}

/* Verdict */
.verdict-sec{background:var(--ink);color:#fff}
.verdict-inner{padding:28px 0;display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap}
.verdict-label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);flex-shrink:0;padding-top:3px;min-width:72px}
.verdict-text{font-size:16px;line-height:1.65;color:rgba(255,255,255,.88)}
@media(max-width:560px){.verdict-inner{flex-direction:column;gap:6px}.verdict-label{min-width:auto}}

/* Section */
.sec{padding:44px 0}
.sec.alt{background:var(--section)}
.sec-title{font-size:19px;font-weight:700;letter-spacing:-.3px;margin-bottom:22px;display:flex;align-items:center;gap:10px}
.sec-num{font-size:12px;font-weight:600;color:var(--blue);background:rgba(0,113,227,.08);border-radius:var(--rb);padding:3px 9px}

/* Info grid */
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--divider);border:1px solid var(--divider);border-radius:var(--rc);overflow:hidden}
@media(max-width:680px){.info-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:400px){.info-grid{grid-template-columns:1fr}}
.info-card{background:var(--bg);padding:20px 22px}
.ic-label{font-size:12px;font-weight:600;color:var(--sub);margin-bottom:6px}
.ic-val{font-size:20px;font-weight:700;letter-spacing:-.4px;line-height:1.2}
.ic-val.blue{color:var(--blue)}
.ic-unit{font-size:12px;font-weight:400;color:var(--sub);margin-left:3px;letter-spacing:0}

/* Table */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--divider);border-radius:var(--rc)}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:600px;table-layout:fixed}
table colgroup col:nth-child(1){width:68px}
table colgroup col:nth-child(2){width:68px}
table colgroup col:nth-child(3){width:68px}
table colgroup col:nth-child(4){width:62px}
table colgroup col:nth-child(5){width:52px}
table colgroup col:nth-child(6){width:82px}
table colgroup col:nth-child(7){width:82px}
table colgroup col:nth-child(8){width:76px}
thead tr{background:var(--section)}
th{padding:10px 10px;text-align:right;font-weight:600;color:var(--sub);font-size:11px;letter-spacing:.01em;border-bottom:1px solid var(--divider);white-space:nowrap;overflow:hidden}
th:first-child{text-align:left}
td{padding:10px 10px;text-align:right;border-bottom:1px solid var(--divider);font-size:13px;white-space:nowrap;overflow:hidden}
td:first-child{text-align:left;font-weight:600}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(0,0,0,.016)}
.tfoot td{background:var(--section);font-weight:700;font-size:13px;border-top:2px solid var(--divider);white-space:nowrap}
.tfoot td:first-child{color:var(--sub)}
.num{font-variant-numeric:tabular-nums}
.hl{color:var(--blue);font-weight:700}
.kookmin-row td{background:rgba(0,113,227,.028)}

/* KV grid */
.kv-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--divider);border:1px solid var(--divider);border-radius:var(--rc);overflow:hidden}
@media(max-width:480px){.kv-grid{grid-template-columns:1fr}}
.kv-row{background:var(--bg);padding:16px 20px;display:flex;flex-direction:column;gap:4px}
.kv-k{font-size:12px;font-weight:600;color:var(--sub)}
.kv-v{font-size:15px;font-weight:500}
.kv-v.blue{color:var(--blue)}

/* Contract pills */
.contract-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.contract-pill{padding:8px 18px;border-radius:var(--rb);font-size:14px;font-weight:600;background:var(--section);display:flex;align-items:center;gap:6px}
.contract-pill .pct{color:var(--blue)}

/* Options */
.opt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(max-width:500px){.opt-grid{grid-template-columns:1fr}}
.opt-card{border:1px solid var(--divider);border-radius:14px;padding:18px;background:var(--bg)}
.opt-type{font-size:11px;font-weight:600;color:var(--sub);margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase}
.opt-name{font-size:15px;font-weight:600;margin-bottom:10px}
.opt-price{font-size:22px;font-weight:700;color:var(--blue);letter-spacing:-.5px;line-height:1}
.opt-price-unit{font-size:12px;font-weight:400;color:var(--sub);margin-left:3px}
.opt-note{font-size:12px;color:var(--sub);margin-top:6px}

/* Entity */
.entity-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(max-width:500px){.entity-grid{grid-template-columns:1fr}}
.entity-card{border:1px solid var(--divider);border-radius:14px;padding:18px;background:var(--bg)}
.entity-role{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--sub);margin-bottom:6px}
.entity-name{font-size:16px;font-weight:700;margin-bottom:3px}
.entity-note{font-size:13px;color:var(--sub);line-height:1.5}

footer{border-top:1px solid var(--divider);padding:32px 0;font-size:12px;color:var(--sub);line-height:1.7}

#errBox{display:none;padding:80px 24px;text-align:center;color:var(--sub)}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="hd-inner">
      <a class="back-btn" href="index.html">‹ 전체 목록</a>
      <div class="hd-logo">Housing<span>DB</span></div>
    </div>
  </div>
</header>

<section class="hero" id="hero" style="display:none">
  <div class="wrap">
    <div class="hero-loc" id="heroLoc"></div>
    <div class="hero-name" id="heroName"></div>
    <div class="hero-meta" id="heroMeta"></div>
  </div>
</section>

<section class="verdict-sec" id="verdictSec" style="display:none">
  <div class="wrap">
    <div class="verdict-inner">
      <div class="verdict-label">심사 판단</div>
      <div class="verdict-text" id="verdictText"></div>
    </div>
  </div>
</section>

<div id="main" style="display:none">

<section class="sec">
  <div class="wrap">
    <div class="sec-title"><span class="sec-num">01</span> 입지 · 건축개요</div>
    <div class="info-grid" id="locGrid"></div>
  </div>
</section>

<section class="sec alt">
  <div class="wrap">
    <div class="sec-title"><span class="sec-num">02</span> 공급면적 · 분양가</div>
    <div class="tbl-wrap">
      <table>
        <colgroup>
          <col><col><col><col><col><col><col><col>
        </colgroup>
        <thead>
          <tr><th>타입</th><th>전용㎡</th><th>공급㎡</th><th>세대수</th><th>비중</th><th>세대평균(억)</th><th>평당가(만)</th><th>매출(억)</th></tr>
        </thead>
        <tbody id="unitTbody"></tbody>
        <tfoot>
          <tr class="tfoot">
            <td colspan="3">합계</td>
            <td id="tUnits" class="num"></td><td>100%</td><td>—</td>
            <td id="tPP" class="num hl"></td>
            <td id="tRev" class="num"></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>
</section>

<section class="sec">
  <div class="wrap">
    <div class="sec-title"><span class="sec-num">03</span> 시행사 수입 · 비용 영향</div>
    <div class="info-grid" id="plGrid"></div>
    <p id="plNote" style="font-size:13px;color:var(--sub);margin-top:14px;line-height:1.65"></p>
  </div>
</section>

<section class="sec alt">
  <div class="wrap">
    <div class="sec-title"><span class="sec-num">04</span> 유상옵션</div>
    <div class="opt-grid" id="optGrid"></div>
  </div>
</section>

<section class="sec">
  <div class="wrap">
    <div class="sec-title"><span class="sec-num">05</span> 판촉 · 계약금 구조</div>
    <div class="contract-pills" id="contractPills"></div>
    <div class="kv-grid" id="dpDetail" style="margin-bottom:16px"></div>
    <div class="sec-title" style="font-size:15px;margin-top:8px;margin-bottom:14px;color:var(--sub)">청약 일정</div>
    <div class="kv-grid" id="promoGrid"></div>
  </div>
</section>

<section class="sec alt">
  <div class="wrap">
    <div class="sec-title"><span class="sec-num">06</span> 사업주체 · 보증</div>
    <div class="entity-grid" id="entityGrid"></div>
  </div>
</section>

</div>

<div id="errBox">
  <div style="font-size:36px;margin-bottom:14px">⚠️</div>
  <div id="errMsg" style="font-size:17px">데이터를 불러올 수 없습니다.</div>
  <div style="margin-top:8px;font-size:13px;color:var(--sub)">URL에 <code>?id=</code> 파라미터가 필요합니다.</div>
</div>

<footer>
  <div class="wrap">
    이 데이터는 입주자모집공고문 기준입니다. 분양가·세대수는 변경될 수 있으며 투자 판단 시 원문서를 반드시 확인하세요.
  </div>
</footer>

<script>
const fmt=(n,d=0)=>n==null?'—':Number(n).toLocaleString('ko-KR',{maximumFractionDigits:d});
const pct=n=>n==null?'—':n+'%';
const badge=(cls,t)=>`<span class="badge ${cls}">${t}</span>`;

/* ── 스키마 정규화 ── 구형(kimhae)·신형 모두 지원 */
function normalize(d){
  const bld=d.building||{}, loc=d.location||{}, p=d.parties||{};
  const pricing=d.pricing||{}, loan=d.loan||{}, dp=d.downPayment||{};
  const guar=d.guarantee||{};

  d._units    = d.units    || bld.totalUnits;
  d._moveIn   = d.moveIn   || bld.moveIn || (d.schedule&&(d.schedule.moveInDate||d.schedule.movein));
  d._regulated= d.regulated!=null ? d.regulated : bld.regulated;
  d._resale   = d.resaleRestriction!=null ? d.resaleRestriction : bld.resaleRestriction;
  d._loanType = d.loanType || loan.type;
  d._loanRatio= d.loanRatio!= null ? d.loanRatio : loan.ratio;
  d._loanDetail= loan.detail || '';
  d._loanBenefit= loan.benefitManwon84A ? `84A 기준 중도금 이자절감 약 ${fmt(loan.benefitManwon84A)}만원 추정` : '';
  d._dpGrade  = d.downPaymentGrade || dp.grade;
  // initialCashRatio는 '초기 납입 비율'이지 계약금 총비율이 아님 → 사용 금지
  // 우선순위: ① top-level downPaymentRatio ② dp.ratio ③ structure 문자열 파싱
  (()=>{
    if(d.downPaymentRatio != null){ d._dpRatio = d.downPaymentRatio; return; }
    if(dp.ratio         != null){ d._dpRatio = dp.ratio;           return; }
    if(dp.totalRatio    != null){ d._dpRatio = dp.totalRatio;      return; }
    const m = dp.structure && dp.structure.match(/^(\d+)%/);
    if(m){ d._dpRatio = Number(m[1]); return; }
    d._dpRatio = null;
  })();
  d._dpStruct = dp.structure || d.downPaymentStructure || '';
  d._dpNote   = dp.gradeNote || '';
  d._avgPP    = d.avgPyeong || pricing.avgPyeongPrice;
  d._gdv      = (d.pl&&d.pl.totalRevenue) || pricing.totalRevenueEok;
  d._hug      = (d.pl&&d.pl.hugGuarantee) || guar.amountEok;
  d._hugCert  = guar.certNo || '';
  d._k84r     = (d.pl&&d.pl.kookmin84Ratio) || pricing.kookmin84Ratio || d.kookmin84Ratio;
  d._fullOpt  = (d.pl&&d.pl.fullOptionRatio!=null) ? d.pl.fullOptionRatio
                : (d.options&&d.options.fullRatio!=null?d.options.fullRatio:null);
  d._plNote   = (d.pl&&d.pl.notes) || pricing.note || '';

  // 위치
  loc._block = loc.block || loc.district;

  // 건축개요
  bld._type  = bld.type || (bld.scale ? bld.scale.split(',')[0].trim() : null);
  const bldMatch = bld.scale && bld.scale.match(/(\d+)개동/);
  bld._bldCnt= bld.buildings != null ? bld.buildings
               : (bldMatch ? bldMatch[1] : null);
  const flrMatch = bld.scale && bld.scale.match(/지상\s*(\d+)층/);
  bld._maxFlr= bld.maxFloor != null ? bld.maxFloor
               : (flrMatch ? Number(flrMatch[1]) : null);

  // 유닛 타입
  const rawU = d.unitTypes || d.unitMix || [];
  d._unitTypes = rawU.map(u=>({
    type:        u.type,
    exclusiveM2: u.exclusiveM2 != null ? u.exclusiveM2 : u.exclusive,
    supplyM2:    u.supplyM2    != null ? u.supplyM2    : u.supply,
    units:       u.units,
    unitAvgPrice:u.unitAvgPrice!= null ? u.unitAvgPrice: u.avgPrice,
    pyeongPrice: u.pyeongPrice,
  }));

  // 유상옵션
  if(Array.isArray(d.options)){
    d._opts = d.options;
  } else if(d.options && Array.isArray(d.options.tiers)){
    d._opts = d.options.tiers.map(t=>({
      category: t.tier,
      name:     t.desc,
      price:    t.manwon84A,
      note:     '84A 기준',
    }));
  } else { d._opts=[]; }

  // 사업주체 — d.constructor는 JS 내장속성과 충돌하므로 hasOwnProperty로 접근
  d._developer  = d.developer   || p.developer;
  d._constructor= (Object.prototype.hasOwnProperty.call(d,'constructor') ? d['constructor'] : null)
                  || p.constructor
                  || (d.contractors&&d.contractors[0]&&d.contractors[0].name);
  d._trustee    = d.trustee || (typeof p.trust==='string' ? p.trust : (p.trust&&p.trust.name));
  d._trustNote  = typeof p.trust==='string' ? (p.trustNote||'') : (p.trust&&p.trust.note||'');
  d._salesAgent = d.salesAgent;
  d._hugGuar    = d.hugGuarantor || (guar.amountEok ? `HUG ${fmt(guar.amountEok)}억` : null);

  // 일정
  const sc=d.schedule||{};
  d._schedDates=[
    {k:'입주자모집공고', v: sc.noticeDate||d.noticeDate},
    {k:'특별공급',       v: sc.special||sc.specialDate},
    {k:'1순위 청약',     v: sc.general1||sc.applicationDate},
    {k:'2순위 청약',     v: sc.general2},
    {k:'당첨자발표',     v: sc.winnerAnnounce||sc.winnerAnnouncementDate},
    {k:'서류제출',       v: sc.docSubmit},
    {k:'계약체결',       v: sc.contract||sc.contractDate},
    {k:'입주예정',       v: d._moveIn},
  ].filter(i=>i.v);

  return d;
}

/* ── 렌더 함수들 ── */
function renderHero(d){
  const loc=d.location||{};
  document.getElementById('heroLoc').textContent=
    [loc.sido,loc.sigungu,loc.dong||loc._block].filter(Boolean).join(' · ');
  document.getElementById('heroName').textContent=d.name;
  const m=[];
  if(d._regulated!=null)m.push(d._regulated?badge('b-danger','규제지역'):badge('b-n','비규제'));
  if(d._resale)m.push(badge('b-warn','전매제한 '+(typeof d._resale==='string'?d._resale:'')));
  if(d._loanType)m.push(d._loanType==='무이자'
    ?badge('b-green','중도금 무이자 '+d._loanRatio+'%')
    :badge('b-warn','중도금 유이자 '+d._loanRatio+'%'));
  if(d._dpGrade){const cl={A:'b-green',B:'b-green',C:'b-warn',D:'b-danger'}[d._dpGrade]||'b-n';
    m.push(badge(cl,'계약금 '+d._dpGrade+'등급'));}
  if(d._moveIn)m.push(badge('b-n','입주 '+d._moveIn));
  document.getElementById('heroMeta').innerHTML=m.join('');
  document.getElementById('hero').style.display='';
}

function renderVerdict(d){
  const v=d.verdict||d.notes;
  if(!v)return;
  document.getElementById('verdictText').textContent=v;
  document.getElementById('verdictSec').style.display='';
}

function renderLocGrid(d){
  const loc=d.location||{},bld=d.building||{};
  const addr=[loc.sido,loc.sigungu,loc.dong].filter(Boolean).join(' ')
    || loc.address || '—';
  const items=[
    {label:'소재지', val:addr},
    {label:'블럭·지구', val:loc._block||loc.district||'—'},
    {label:'건축규모', val:bld._type||'—'},
    {label:'최고층수', val:bld._maxFlr, unit:'층'},
    {label:'동수', val:bld._bldCnt||bld.buildings, unit:bld._bldCnt?'':'동'},
    {label:'총세대', val:fmt(d._units), unit:'세대'},
  ];
  document.getElementById('locGrid').innerHTML=items.map(i=>
    `<div class="info-card"><div class="ic-label">${i.label}</div>
    <div class="ic-val">${i.val!=null&&i.val!==''?i.val:'—'}<span class="ic-unit">${i.unit||''}</span></div></div>`
  ).join('');
}

function renderUnitTable(d){
  const units=d._unitTypes;
  if(!units.length){
    document.getElementById('unitTbody').innerHTML=
      '<tr><td colspan="8" style="text-align:center;color:var(--sub);padding:28px">단위타입 데이터 없음</td></tr>';
    return;
  }
  // unitAvgPrice 단위 = 만원
  // 매출(억) = unitAvgPrice(만) × units ÷ 10,000
  const tu  = units.reduce((a,u)=>a+u.units, 0);
  const trM = units.reduce((a,u)=>a+(u.unitAvgPrice*u.units), 0); // 만원 합계
  const tm  = units.reduce((a,u)=>a+(u.supplyM2*u.units), 0);     // ㎡ 합계
  const wpp = tm ? Math.round(trM/tm*3.305785124) : 0;            // 만원/평
  document.getElementById('unitTbody').innerHTML=units.map(u=>{
    const sp = (tu?(u.units/tu*100).toFixed(1):'—')+'%';
    const isK = u.type.startsWith('84');
    const avgEok = (u.unitAvgPrice/10000).toFixed(2);             // 만→억 변환
    const revEok = Math.round(u.unitAvgPrice*u.units/10000);      // 만원합계→억
    return `<tr class="${isK?'kookmin-row':''}">
      <td>${u.type}</td>
      <td class="num">${fmt(u.exclusiveM2,2)}</td>
      <td class="num">${fmt(u.supplyM2,2)}</td>
      <td class="num">${fmt(u.units)}</td>
      <td>${sp}</td>
      <td class="num">${avgEok}억</td>
      <td class="num hl">${fmt(u.pyeongPrice)}만</td>
      <td class="num">${fmt(revEok)}억</td>
    </tr>`;
  }).join('');
  document.getElementById('tUnits').textContent = fmt(tu)+' 세대';
  document.getElementById('tPP').textContent    = fmt(wpp)+' 만/평';
  document.getElementById('tRev').textContent   = fmt(Math.round(trM/10000))+' 억'; // 만→억
}

function renderPL(d){
  const items=[
    {label:'분양수입 (GDV)',  val:d._gdv !=null?fmt(d._gdv) :'—', unit:'억',cls:'blue'},
    {label:'가중 평당분양가', val:d._avgPP!=null?fmt(d._avgPP):'—', unit:'만/평',cls:'blue'},
    {label:'HUG 보증한도',   val:d._hug !=null?fmt(d._hug) :'—', unit:'억'},
    {label:'국민평형 비중',   val:pct(d._k84r), unit:''},
    {label:'중도금 방식',     val:(d._loanType||'—')+(d._loanRatio!=null?' '+d._loanRatio+'%':''), unit:''},
    {label:'풀옵션 비중',     val:d._fullOpt!=null?pct(d._fullOpt):'—', unit:''},
  ];
  document.getElementById('plGrid').innerHTML=items.map(i=>
    `<div class="info-card"><div class="ic-label">${i.label}</div>
    <div class="ic-val ${i.cls||''}">${i.val}<span class="ic-unit">${i.unit}</span></div></div>`
  ).join('');
  if(d._plNote)document.getElementById('plNote').textContent=d._plNote;
}

function renderOptions(d){
  const g=document.getElementById('optGrid');
  if(!d._opts.length){g.innerHTML='<div style="color:var(--sub);font-size:14px">유상옵션 정보 없음</div>';return;}
  g.innerHTML=d._opts.map(o=>`<div class="opt-card">
    <div class="opt-type">${o.category||''}</div>
    <div class="opt-name">${o.name||''}</div>
    <div class="opt-price">${fmt(o.price)}<span class="opt-price-unit">만원</span></div>
    ${o.note?`<div class="opt-note">${o.note}</div>`:''}
  </div>`).join('');
}

function renderContract(d){
  const sc=d.schedule||{};
  const steps=sc.contractSteps||sc.paymentSteps||[];
  const pills=document.getElementById('contractPills');

  // 납부비율 Pills
  if(steps.length){
    pills.innerHTML=steps.map((s,i)=>`<div class="contract-pill">
      <span style="color:var(--sub);font-size:12px">${i+1}</span>
      <span>${s.label||s.name}</span><span class="pct">${pct(s.ratio||s.pct)}</span>
    </div>`).join('');
  } else {
    // _dpRatio: structure 파싱으로 구한 실제 계약금 총비율 (예: 5, 10, 20)
    const dpR = d._dpRatio != null ? d._dpRatio : 5;  // 없으면 일반적인 5% 기본값
    const lnR = d._loanRatio != null ? d._loanRatio : 0;
    const bal = Math.max(0, 100 - dpR - lnR);
    const it  = [
      {label:'계약금', p:dpR},
      ...(lnR>0 ? [{label:`중도금 (${d._loanType||''})`, p:lnR}] : []),
      ...(bal>0 ? [{label:'잔금', p:bal}] : []),
    ];
    pills.innerHTML=it.map((s,i)=>`<div class="contract-pill">
      <span style="color:var(--sub);font-size:12px">${i+1}</span>
      <span>${s.label}</span><span class="pct">${s.p}%</span>
    </div>`).join('');
  }

  // 계약금 상세 박스
  const dpBox=document.getElementById('dpDetail');
  const dpRows=[];
  if(d._dpGrade)  dpRows.push({k:'계약금 등급', v:d._dpGrade+'등급'});
  if(d._dpStruct) dpRows.push({k:'납부구조',    v:d._dpStruct});
  if(d._dpNote)   dpRows.push({k:'PF 관점',     v:d._dpNote});
  if(d._loanDetail) dpRows.push({k:'중도금 상세', v:d._loanDetail});
  if(d._loanBenefit) dpRows.push({k:'이자절감 추정', v:d._loanBenefit});
  dpBox.innerHTML=dpRows.length
    ? dpRows.map(r=>`<div class="kv-row"><div class="kv-k">${r.k}</div><div class="kv-v">${r.v}</div></div>`).join('')
    : '';

  // 청약 일정
  document.getElementById('promoGrid').innerHTML=d._schedDates.map(i=>
    `<div class="kv-row"><div class="kv-k">${i.k}</div><div class="kv-v">${i.v}</div></div>`
  ).join('');
}

function renderEntities(d){
  const roles=[
    {role:'시행사',  name:d._developer},
    {role:'시공사',  name:d._constructor},
    {role:'신탁사',  name:d._trustee},
    {role:'분양대행',name:d._salesAgent},
    {role:'HUG 보증',name:d._hugGuar},
  ].filter(e=>e.name);
  const g=document.getElementById('entityGrid');
  if(!roles.length){g.innerHTML='<div style="color:var(--sub);font-size:14px">사업주체 정보 없음</div>';return;}
  g.innerHTML=roles.map(e=>`<div class="entity-card">
    <div class="entity-role">${e.role}</div>
    <div class="entity-name">${e.name}</div>
  </div>`).join('');
}

function showErr(msg){
  document.getElementById('errBox').style.display='block';
  if(msg)document.getElementById('errMsg').textContent=msg;
}

const id=new URLSearchParams(location.search).get('id');
if(!id){showErr('id 파라미터가 없습니다.');}
else{
  fetch(`data/sites/${id}.json`).then(r=>{
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.json();
  }).then(raw=>{
    const d=normalize(raw);
    document.title=d.name+' — PF 심사 DB';
    renderHero(d);renderVerdict(d);renderLocGrid(d);
    renderUnitTable(d);renderPL(d);renderOptions(d);
    renderContract(d);renderEntities(d);
    document.getElementById('main').style.display='';
  }).catch(e=>showErr(`데이터 로드 실패: ${e.message} (data/sites/${id}.json)`));
}
</script>
</body>
</html>
