<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입주자모집공고 분석 DB</title>
<style>
  :root{
    --primary:#0066cc; --primary-focus:#0071e3;
    --ink:#1d1d1f; --muted80:#333; --muted48:#7a7a7a;
    --canvas:#fff; --parchment:#f5f5f7; --pearl:#fafafc;
    --hairline:#e0e0e0; --divider:#f0f0f0;
    --green:#1d8a34; --orange:#c25e00; --red:#c4271c;
    --shadow:rgba(0,0,0,.22) 3px 5px 30px 0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"SF Pro Text",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--parchment);color:var(--ink);-webkit-font-smoothing:antialiased;
    font-size:17px;line-height:1.47;letter-spacing:-.374px}
  .disp{font-family:"SF Pro Display",system-ui,-apple-system,sans-serif}
  .wrap{max-width:1080px;margin:0 auto;padding:0 24px}
  a{color:var(--primary);text-decoration:none}

  /* 글로벌 나브 */
  .gnav{background:#000;color:#fff;height:44px;display:flex;align-items:center}
  .gnav .wrap{display:flex;align-items:center;gap:22px;width:100%}
  .gnav span{font-size:12px;letter-spacing:-.12px;color:#f5f5f7}
  .gnav .logo{font-weight:600}

  /* 히어로 */
  header{background:var(--canvas);padding:64px 0 48px;text-align:center}
  h1{font-family:"SF Pro Display",system-ui,sans-serif;font-size:48px;font-weight:600;line-height:1.08;letter-spacing:-.5px}
  .lead{font-size:24px;font-weight:400;color:var(--muted80);letter-spacing:0;margin-top:12px}
  .meta{font-size:14px;color:var(--muted48);letter-spacing:-.224px;margin-top:16px}

  section{padding:48px 0}
  .sec-label{font-size:21px;font-weight:600;letter-spacing:.231px;margin-bottom:20px}

  /* 시도 집계 */
  .sido-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px}
  .sido-card{background:var(--canvas);border:1px solid var(--hairline);border-radius:18px;padding:24px}
  .sido-card .nm{font-size:17px;font-weight:600;letter-spacing:-.374px}
  .sido-card .big{font-family:"SF Pro Display",system-ui,sans-serif;font-size:40px;font-weight:600;letter-spacing:-.5px;margin:6px 0 4px}
  .sido-card .big small{font-size:15px;font-weight:400;color:var(--muted48)}
  .sido-card .sm{font-size:14px;color:var(--muted48);letter-spacing:-.224px}

  /* 컨트롤 */
  .controls{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:24px}
  .controls .lbl{font-size:14px;color:var(--muted48);letter-spacing:-.224px}
  select{font-family:inherit;font-size:14px;letter-spacing:-.224px;padding:8px 14px;border:1px solid var(--hairline);background:var(--canvas);border-radius:9999px;color:var(--ink);cursor:pointer}
  .search{flex:1;min-width:200px;max-width:320px;display:flex;align-items:center;background:var(--canvas);border:1px solid var(--hairline);border-radius:9999px;padding:0 20px;height:44px}
  .search input{border:none;outline:none;background:none;font-family:inherit;font-size:17px;letter-spacing:-.374px;width:100%;color:var(--ink)}
  .count{margin-left:auto;font-size:14px;color:var(--muted48);letter-spacing:-.224px}

  /* 현장 카드 */
  .site-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:24px}
  .site-card{background:var(--canvas);border:1px solid var(--hairline);border-radius:18px;padding:28px;display:block;color:inherit;transition:transform .25s ease,box-shadow .25s ease}
  .site-card:active{transform:scale(.985)}
  .site-card:hover{box-shadow:var(--shadow)}
  .sc-name{font-family:"SF Pro Display",system-ui,sans-serif;font-size:28px;font-weight:600;letter-spacing:-.4px;line-height:1.1}
  .sc-loc{font-size:14px;color:var(--muted48);letter-spacing:-.224px;margin:8px 0 24px}
  .sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px 16px}
  .kv .k{font-size:12px;letter-spacing:-.12px;color:var(--muted48)}
  .kv .v{font-family:"SF Pro Display",system-ui,sans-serif;font-size:28px;font-weight:600;letter-spacing:-.4px;margin-top:2px}
  .kv .v small{font-size:14px;font-weight:400;color:var(--muted48);letter-spacing:-.224px}
  .kv .v.txt{font-size:20px}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:24px;padding-top:20px;border-top:1px solid var(--divider)}
  .chip{font-size:12px;letter-spacing:-.12px;padding:6px 14px;border-radius:9999px;background:var(--pearl);color:var(--muted80);border:1px solid var(--divider)}
  .chip.g{color:var(--green);border-color:#cfe8d4} .chip.o{color:var(--orange);border-color:#f0ddc4} .chip.r{color:var(--red);border-color:#f0cdc9}
  .chip.b{color:var(--primary);border-color:#cfe0f2}

  .empty{grid-column:1/-1;text-align:center;color:var(--muted48);padding:60px}
  footer{background:var(--parchment);padding:64px 0;margin-top:32px}
  footer .wrap{font-size:12px;letter-spacing:-.12px;color:var(--muted48);line-height:1.8}
  code{font-family:"SF Mono",ui-monospace,monospace;font-size:11px;background:var(--canvas);padding:1px 5px;border-radius:5px;border:1px solid var(--divider)}

  @media(max-width:640px){h1{font-size:34px}.lead{font-size:21px}}
</style>
</head>
<body>
<nav class="gnav"><div class="wrap"><span class="logo">분석 DB</span><span>입주자모집공고</span><span style="margin-left:auto">PF 심사 도구</span></div></nav>

<header>
  <div class="wrap">
    <h1>입주자모집공고 분석 DB</h1>
    <p class="lead">PF 대주 심사 · 시행 P&amp;L 관점 전국 분양현장 데이터베이스</p>
    <p class="meta" id="meta">로딩 중…</p>
  </div>
</header>

<div class="wrap">
  <section>
    <div class="sec-label disp">광역시도 집계</div>
    <div class="sido-grid" id="sidoGrid"></div>
  </section>

  <section style="padding-top:0">
    <div class="controls">
      <span class="lbl">시도</span>
      <select id="fSido"><option value="">전체</option></select>
      <span class="lbl">정렬</span>
      <select id="fSort">
        <option value="pp-asc">평당가 ↑ (싼 순)</option>
        <option value="pp-desc">평당가 ↓ (비싼 순)</option>
        <option value="units-desc">세대수 ↓</option>
        <option value="kookmin-desc">국민평형비중 ↓</option>
        <option value="movein-asc">입주 빠른 순</option>
      </select>
      <div class="search"><input type="text" id="fSearch" placeholder="현장명 검색"></div>
      <span class="count" id="count"></span>
    </div>
    <div class="site-list" id="siteList"></div>
  </section>
</div>

<footer>
  <div class="wrap">
    화면 코드는 고정 — 새 현장은 <code>data/sites/{id}.json</code> 추가 후 <code>data/index.json</code>의 sites 배열에 요약 1건 추가하면 자동 반영됩니다.<br>
    평당가 = 전 세대 분양가 합산 ÷ 총 공급평수(면적가중). 발코니·중도금은 수분양자 혜택 기준 표기이며 시행사 입장에선 매출차감·금융비용 요소입니다.
  </div>
</footer>

<script>
const fmt = n => n==null?'-':n.toLocaleString('ko-KR');
let ALL=[];
function loanChip(s){return s.loanType==='무이자'?'<span class="chip g">중도금 무이자 '+s.loanRatio+'%</span>':'<span class="chip o">중도금 유이자 '+s.loanRatio+'%</span>';}
function dpChip(g){const m={A:'g',B:'g',C:'o',D:'r'};return '<span class="chip '+(m[g]||'o')+'">계약금 '+g+'등급</span>';}
function regChip(s){return s.regulated?'<span class="chip r">규제지역</span>':'<span class="chip b">비규제</span>';}

function renderSido(sites){
  const map={};
  sites.forEach(s=>{if(!map[s.sido])map[s.sido]={units:0,n:0,ppSum:0};map[s.sido].units+=s.units;map[s.sido].n++;map[s.sido].ppSum+=s.avgPyeong;});
  document.getElementById('sidoGrid').innerHTML=Object.entries(map).sort((a,b)=>b[1].n-a[1].n).map(([k,v])=>`
    <div class="sido-card">
      <div class="nm">${k}</div>
      <div class="big">${v.n}<small> 개 현장</small></div>
      <div class="sm">총 ${fmt(v.units)}세대 · 평균 ${fmt(Math.round(v.ppSum/v.n))}만/평</div>
    </div>`).join('');
}
function renderList(){
  const sido=fSido.value,sort=fSort.value,q=fSearch.value.trim();
  let arr=ALL.filter(s=>(!sido||s.sido===sido)&&(!q||s.name.includes(q)));
  const S={'pp-asc':(a,b)=>a.avgPyeong-b.avgPyeong,'pp-desc':(a,b)=>b.avgPyeong-a.avgPyeong,'units-desc':(a,b)=>b.units-a.units,'kookmin-desc':(a,b)=>b.kookmin84Ratio-a.kookmin84Ratio,'movein-asc':(a,b)=>a.moveIn.localeCompare(b.moveIn)};
  arr.sort(S[sort]);
  count.textContent=arr.length+' / '+ALL.length+' 현장';
  siteList.innerHTML=arr.length?arr.map(s=>`
    <a class="site-card" href="site.html?id=${s.id}">
      <div class="sc-name">${s.name}</div>
      <div class="sc-loc">${s.sido} ${s.sigungu} · ${s.district||''} · 입주 ${s.moveIn}</div>
      <div class="sc-grid">
        <div class="kv"><div class="k">총세대수</div><div class="v">${fmt(s.units)}</div></div>
        <div class="kv"><div class="k">평균 평당가</div><div class="v">${fmt(s.avgPyeong)}<small> 만원</small></div></div>
        <div class="kv"><div class="k">국민평형 84㎡</div><div class="v">${s.kookmin84Ratio}<small> %</small></div></div>
        <div class="kv"><div class="k">발코니</div><div class="v txt">${s.balcony}</div></div>
      </div>
      <div class="chips">${regChip(s)} ${loanChip(s)} ${dpChip(s.downPaymentGrade)} <span class="chip">풀옵션 ${s.fullOptionRatio}%</span></div>
    </a>`).join(''):'<div class="empty">조건에 맞는 현장이 없습니다.</div>';
}
fetch('data/index.json').then(r=>r.json()).then(d=>{
  ALL=d.sites;
  meta.textContent='최종 갱신 '+d.updated+' · 등록 현장 '+ALL.length+'개';
  [...new Set(ALL.map(s=>s.sido))].forEach(v=>{const o=document.createElement('option');o.value=o.textContent=v;fSido.appendChild(o)});
  renderSido(ALL);renderList();
  ['fSido','fSort','fSearch'].forEach(id=>document.getElementById(id).addEventListener('input',renderList));
}).catch(()=>{meta.textContent='데이터 로드 실패 — 로컬에서 열면 CORS로 차단됩니다. GitHub Pages 또는 로컬 서버에서 확인하세요.';});
</script>
</body>
</html>
