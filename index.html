<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입주자모집공고 분석 DB</title>
<style>
  :root{
    --bg:#f6f3ec; --paper:#fffdf8; --ink:#1c1a17; --sub:#6b6358;
    --line:#d9d2c5; --brass:#9c6b25; --brass-soft:#f0e6d4;
    --green:#2e7d32; --orange:#e08a00; --red:#c62828; --blue:#1f5f8b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Spectral",Georgia,serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .mono{font-family:"IBM Plex Mono","SFMono-Regular",Consolas,monospace}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px}

  header{border-bottom:2px solid var(--ink);padding:28px 0 20px;margin-bottom:24px;background:var(--paper)}
  .brand{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px}
  h1{font-size:30px;font-weight:700;letter-spacing:-.5px}
  .tagline{color:var(--sub);font-size:13px}
  .meta{font-size:12px;color:var(--sub);margin-top:6px}

  .section-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--brass);font-weight:700;margin:0 0 12px}

  /* 시도 집계 패널 */
  .sido-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:32px}
  .sido-card{background:var(--paper);border:1px solid var(--line);border-radius:2px;padding:14px 16px}
  .sido-card .nm{font-size:14px;font-weight:700}
  .sido-card .big{font-size:26px;font-weight:700;margin:4px 0;letter-spacing:-1px}
  .sido-card .sm{font-size:11px;color:var(--sub)}

  /* 컨트롤 */
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:14px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:20px}
  .controls label{font-size:11px;color:var(--sub);letter-spacing:1px;text-transform:uppercase}
  select,input[type=text]{font-family:inherit;font-size:13px;padding:6px 10px;border:1px solid var(--line);background:var(--paper);border-radius:2px;color:var(--ink)}
  .count{margin-left:auto;font-size:12px;color:var(--sub)}

  /* 현장 카드 리스트 */
  .site-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
  .site-card{background:var(--paper);border:1px solid var(--line);border-radius:2px;padding:18px 20px;text-decoration:none;color:inherit;display:block;transition:border-color .15s,transform .15s}
  .site-card:hover{border-color:var(--brass);transform:translateY(-2px)}
  .sc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px}
  .sc-name{font-size:18px;font-weight:700;letter-spacing:-.3px}
  .sc-loc{font-size:12px;color:var(--sub);margin-bottom:14px}
  .sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
  .kv .k{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--sub)}
  .kv .v{font-size:17px;font-weight:700}
  .kv .v small{font-size:11px;font-weight:400;color:var(--sub)}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px;padding-top:12px;border-top:1px dashed var(--line)}
  .badge{font-size:10px;padding:3px 8px;border-radius:2px;font-weight:700;letter-spacing:.5px}
  .b-line{background:var(--brass-soft);color:var(--brass)}
  .b-green{background:#e6f0e6;color:var(--green)}
  .b-orange{background:#fbeed6;color:var(--orange)}
  .b-red{background:#f6e0e0;color:var(--red)}

  .empty{grid-column:1/-1;text-align:center;color:var(--sub);padding:60px;font-style:italic}
  footer{margin:48px 0 32px;padding-top:18px;border-top:1px solid var(--line);font-size:11px;color:var(--sub);line-height:1.7}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="brand">
      <h1>입주자모집공고 분석 DB</h1>
      <span class="tagline">PF 대주 심사 · 시행 P&amp;L 관점 전국 분양현장 데이터베이스</span>
    </div>
    <div class="meta mono" id="meta">로딩 중…</div>
  </div>
</header>

<div class="wrap">
  <p class="section-label">광역시도 집계</p>
  <div class="sido-grid" id="sidoGrid"></div>

  <div class="controls">
    <label>시도</label>
    <select id="fSido"><option value="">전체</option></select>
    <label>정렬</label>
    <select id="fSort">
      <option value="pp-asc">평당가 ↑ (싼 순)</option>
      <option value="pp-desc">평당가 ↓ (비싼 순)</option>
      <option value="units-desc">세대수 ↓</option>
      <option value="kookmin-desc">국민평형비중 ↓</option>
      <option value="movein-asc">입주 빠른 순</option>
    </select>
    <input type="text" id="fSearch" placeholder="현장명 검색…">
    <span class="count mono" id="count"></span>
  </div>

  <div class="site-list" id="siteList"></div>

  <footer>
    화면 코드는 고정 — 새 현장은 <code class="mono">data/sites/{id}.json</code> 추가 후 <code class="mono">data/index.json</code>의 sites 배열에 요약 1건 추가하면 자동 반영됩니다.<br>
    평당가 = 전 세대 분양가 합산 ÷ 총 공급평수(면적가중). 발코니·중도금은 수분양자 혜택 기준 표기이며 시행사 입장에선 매출차감·금융비용 요소입니다.
  </footer>
</div>

<script>
const fmt = n => n==null?'-':n.toLocaleString('ko-KR');
let ALL = [];

function loanBadge(s){
  if(s.loanType==='무이자') return '<span class="badge b-green">중도금 무이자 '+s.loanRatio+'%</span>';
  return '<span class="badge b-orange">중도금 유이자 '+s.loanRatio+'%</span>';
}
function dpBadge(g){
  const m={A:'b-green',B:'b-green',C:'b-orange',D:'b-red'};
  return '<span class="badge '+(m[g]||'b-orange')+'">계약금 '+g+'등급</span>';
}
function regBadge(s){
  return s.regulated ? '<span class="badge b-red">규제지역</span>' : '<span class="badge b-line">비규제</span>';
}

function renderSido(sites){
  const map={};
  sites.forEach(s=>{
    if(!map[s.sido]) map[s.sido]={units:0,n:0,ppSum:0};
    map[s.sido].units+=s.units; map[s.sido].n++; map[s.sido].ppSum+=s.avgPyeong;
  });
  const grid=document.getElementById('sidoGrid');
  grid.innerHTML = Object.entries(map).sort((a,b)=>b[1].n-a[1].n).map(([k,v])=>`
    <div class="sido-card">
      <div class="nm">${k}</div>
      <div class="big mono">${v.n}<small style="font-size:13px;font-weight:400"> 개 현장</small></div>
      <div class="sm mono">총 ${fmt(v.units)}세대 · 평균 ${fmt(Math.round(v.ppSum/v.n))}만/평</div>
    </div>`).join('');
}

function renderList(){
  const sido=document.getElementById('fSido').value;
  const sort=document.getElementById('fSort').value;
  const q=document.getElementById('fSearch').value.trim();
  let arr=ALL.filter(s=>(!sido||s.sido===sido)&&(!q||s.name.includes(q)));
  const sorters={
    'pp-asc':(a,b)=>a.avgPyeong-b.avgPyeong,
    'pp-desc':(a,b)=>b.avgPyeong-a.avgPyeong,
    'units-desc':(a,b)=>b.units-a.units,
    'kookmin-desc':(a,b)=>b.kookmin84Ratio-a.kookmin84Ratio,
    'movein-asc':(a,b)=>a.moveIn.localeCompare(b.moveIn),
  };
  arr.sort(sorters[sort]);
  document.getElementById('count').textContent=arr.length+' / '+ALL.length+' 현장';
  const list=document.getElementById('siteList');
  if(!arr.length){list.innerHTML='<div class="empty">조건에 맞는 현장이 없습니다.</div>';return;}
  list.innerHTML=arr.map(s=>`
    <a class="site-card" href="site.html?id=${s.id}">
      <div class="sc-top"><div class="sc-name">${s.name}</div></div>
      <div class="sc-loc">${s.sido} ${s.sigungu} · ${s.district||''} · 입주 ${s.moveIn}</div>
      <div class="sc-grid">
        <div class="kv"><div class="k">총세대수</div><div class="v mono">${fmt(s.units)}</div></div>
        <div class="kv"><div class="k">평균 평당가</div><div class="v mono">${fmt(s.avgPyeong)}<small> 만원</small></div></div>
        <div class="kv"><div class="k">국민평형 84㎡</div><div class="v mono">${s.kookmin84Ratio}<small> %</small></div></div>
        <div class="kv"><div class="k">발코니</div><div class="v" style="font-size:14px">${s.balcony}</div></div>
      </div>
      <div class="badges">
        ${regBadge(s)} ${loanBadge(s)} ${dpBadge(s.downPaymentGrade)}
        <span class="badge b-line">풀옵션 ${s.fullOptionRatio}%</span>
      </div>
    </a>`).join('');
}

fetch('data/index.json').then(r=>r.json()).then(d=>{
  ALL=d.sites;
  document.getElementById('meta').textContent='최종 갱신 '+d.updated+' · 등록 현장 '+ALL.length+'개';
  const sel=document.getElementById('fSido');
  [...new Set(ALL.map(s=>s.sido))].forEach(v=>{const o=document.createElement('option');o.value=o.textContent=v;sel.appendChild(o)});
  renderSido(ALL); renderList();
  ['fSido','fSort','fSearch'].forEach(id=>document.getElementById(id).addEventListener('input',renderList));
}).catch(e=>{
  document.getElementById('meta').textContent='데이터 로드 실패 — 로컬에서 열면 CORS로 차단됩니다. GitHub Pages 또는 로컬 서버에서 확인하세요.';
});
</script>
</body>
</html>
