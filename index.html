<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입주자모집공고 분석 DB — PF 심사 플랫폼</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#fff; --section:#f5f5f7; --ink:#1d1d1f; --sub:#6e6e73;
  --divider:#e5e5e7; --blue:#0071e3; --blue-h:#0066cc;
  --green:#34c759; --warn:#ff9f0a; --danger:#ff453a;
  --rc:18px; --rb:999px; --ri:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:17px;line-height:1.6}
a{color:inherit;text-decoration:none}

.wrap{max-width:1280px;margin:0 auto;padding:0 48px}
@media(max-width:768px){.wrap{padding:0 20px}}

/* Header */
header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.88);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--divider)}
.hd-inner{display:flex;align-items:center;justify-content:space-between;padding:16px 0;gap:12px;flex-wrap:wrap}
.logo{font-size:15px;font-weight:700;letter-spacing:-.3px}.logo span{color:var(--blue)}
.hd-meta{font-size:13px;color:var(--sub)}

/* Hero */
.hero{padding:88px 0 72px;text-align:center}
.hero-eye{font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);margin-bottom:16px}
.hero-title{font-size:clamp(34px,5vw,56px);font-weight:700;letter-spacing:-1.5px;line-height:1.1;margin-bottom:20px}
.hero-sub{font-size:18px;color:var(--sub);max-width:520px;margin:0 auto;line-height:1.65}

/* KPI */
.kpi-sec{background:var(--section);padding:56px 0}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--divider);border:1px solid var(--divider);border-radius:var(--rc);overflow:hidden}
@media(max-width:768px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.kpi-grid{grid-template-columns:1fr}}
.kpi-card{background:var(--bg);padding:36px 28px;transition:background .2s}
.kpi-card:hover{background:#fafafa}
.kpi-label{font-size:13px;font-weight:600;color:var(--sub);margin-bottom:10px}
.kpi-val{font-size:clamp(36px,4vw,52px);font-weight:700;letter-spacing:-2px;line-height:1;color:var(--ink)}
.kpi-val.blue{color:var(--blue)}
.kpi-unit{font-size:16px;font-weight:400;color:var(--sub);margin-left:3px;letter-spacing:0}

/* Chart */
.chart-sec{padding:72px 0 56px}
.sec-hd{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap}
.sec-title{font-size:26px;font-weight:700;letter-spacing:-.5px}
.sec-sub{font-size:14px;color:var(--sub);margin-top:4px}
.chart-legend{display:flex;gap:18px;align-items:center;flex-shrink:0}
.leg-item{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--sub)}
.leg-bar{width:14px;height:12px;border-radius:3px;background:rgba(0,113,227,.18);border:1.5px solid var(--blue)}
.leg-line{width:22px;height:2px;background:var(--danger);border-radius:1px}
.chart-box{background:var(--section);border-radius:var(--rc);padding:28px;height:260px;position:relative}

/* Filter */
.filter-sec{padding:0 0 40px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.chip{padding:8px 18px;border-radius:var(--rb);border:1.5px solid var(--divider);background:var(--bg);color:var(--ink);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s ease;font-family:inherit;line-height:1}
.chip:hover{border-color:var(--blue);color:var(--blue)}
.chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.search-row{display:grid;grid-template-columns:1fr auto;gap:12px}
@media(max-width:640px){.search-row{grid-template-columns:1fr}}
.s-input{width:100%;padding:15px 22px;border-radius:var(--ri);border:1.5px solid var(--divider);background:var(--section);color:var(--ink);font-size:17px;font-family:inherit;outline:none;transition:all .2s}
.s-input:focus{border-color:var(--blue);background:var(--bg);box-shadow:0 0 0 4px rgba(0,113,227,.08)}
.s-input::placeholder{color:var(--sub)}
.s-select{padding:15px 18px;border-radius:var(--ri);border:1.5px solid var(--divider);background:var(--section);color:var(--ink);font-size:15px;font-family:inherit;outline:none;cursor:pointer;white-space:nowrap;transition:border-color .2s}
.s-select:focus{border-color:var(--blue)}
.result-cnt{font-size:13px;color:var(--sub);padding-top:12px}

/* Cards */
.cards-sec{padding:0 0 88px}
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:1024px){.card-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.card-grid{grid-template-columns:1fr}}
.site-card{display:block;background:var(--bg);border:1px solid var(--divider);border-radius:var(--rc);padding:26px;transition:transform .25s,box-shadow .25s,border-color .25s}
.site-card:hover{transform:translateY(-4px) scale(1.004);box-shadow:0 2px 16px rgba(0,0,0,.07);border-color:rgba(0,113,227,.25)}
.site-card:active{transform:scale(.98)}
.c-loc{font-size:12px;color:var(--sub);margin-bottom:7px;display:flex;gap:5px}
.c-name{font-size:20px;font-weight:700;letter-spacing:-.4px;line-height:1.2;margin-bottom:18px}
.c-stats{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.cs-label{font-size:11px;color:var(--sub);font-weight:500;margin-bottom:3px;letter-spacing:.02em}
.cs-val{font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1}
.cs-unit{font-size:12px;font-weight:400;color:var(--sub);margin-left:2px}
.c-chips{display:flex;gap:5px;flex-wrap:wrap;border-top:1px solid var(--divider);padding-top:14px}
.badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:var(--rb);letter-spacing:.01em}
.b-blue{background:rgba(0,113,227,.08);color:var(--blue)}
.b-green{background:rgba(52,199,89,.1);color:#248a3d}
.b-warn{background:rgba(255,159,10,.1);color:#b86200}
.b-danger{background:rgba(255,69,58,.08);color:#c0392b}
.b-n{background:var(--section);color:var(--sub)}

.empty{grid-column:1/-1;text-align:center;padding:72px 0;color:var(--sub);font-size:17px}

footer{border-top:1px solid var(--divider);padding:40px 0;font-size:13px;color:var(--sub);line-height:1.8}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="hd-inner">
      <div class="logo">Housing<span>DB</span></div>
      <div class="hd-meta" id="hdMeta">데이터 로딩 중…</div>
    </div>
  </div>
</header>

<section class="hero">
  <div class="wrap">
    <p class="hero-eye">전국 분양시장 데이터베이스</p>
    <h1 class="hero-title">입주자 모집공고<br>분석 DB</h1>
    <p class="hero-sub">PF 심사 및 시행사 사업성 검토를 위한<br>전국 분양정보 데이터 플랫폼</p>
  </div>
</section>

<section class="kpi-sec">
  <div class="wrap">
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">총 현장수</div><div class="kpi-val" id="kN">—</div></div>
      <div class="kpi-card"><div class="kpi-label">총 공급세대</div><div class="kpi-val" id="kU">—</div></div>
      <div class="kpi-card"><div class="kpi-label">평균 평당분양가</div><div class="kpi-val blue" id="kP">—</div></div>
      <div class="kpi-card"><div class="kpi-label">국민평형 평균 비중</div><div class="kpi-val" id="kK">—</div></div>
    </div>
  </div>
</section>

<!-- Chart: 지역 선택 시에만 표시 -->
<section class="chart-sec" id="chartSec" style="display:none">
  <div class="wrap">
    <div class="sec-hd">
      <div>
        <div class="sec-title">평당분양가 추이</div>
        <div class="sec-sub" id="chartSub"></div>
      </div>
      <div class="chart-legend">
        <div class="leg-item"><div class="leg-bar"></div><span>평당분양가</span></div>
        <div class="leg-item"><div class="leg-line"></div><span>추세선</span></div>
      </div>
    </div>
    <div class="chart-box" id="chartBox"><canvas id="ppChart"></canvas></div>
  </div>
</section>

<section class="filter-sec">
  <div class="wrap">
    <div class="chips" id="chips"></div>
    <div class="search-row">
      <input class="s-input" type="text" id="fSearch" placeholder="현장명 검색…" autocomplete="off">
      <select class="s-select" id="fSort">
        <option value="pp-asc">평당가 낮은 순</option>
        <option value="pp-desc">평당가 높은 순</option>
        <option value="units-desc">세대수 많은 순</option>
        <option value="kookmin-desc">국민평형 비중 순</option>
        <option value="movein-asc">입주 빠른 순</option>
      </select>
    </div>
    <div class="result-cnt" id="resCnt"></div>
  </div>
</section>

<section class="cards-sec">
  <div class="wrap">
    <div class="card-grid" id="grid"></div>
  </div>
</section>

<footer>
  <div class="wrap">
    새 현장은 <code>data/sites/{id}.json</code> 추가 후 <code>data/index.json</code> 업데이트 시 자동 반영됩니다.<br>
    평당가 = 전 세대 분양가 합산 ÷ 총 공급평수(면적 가중). 발코니·중도금은 수분양자 혜택 기준 표기입니다.
  </div>
</footer>

<script>
const fmt = n => n == null ? '—' : Number(n).toLocaleString('ko-KR');
let ALL = [], chartInst = null, activeSido = '';

/* ── 뱃지 ── */
function loanBadge(s){
  return s.loanType==='무이자'
    ?`<span class="badge b-green">중도금 무이자 ${s.loanRatio}%</span>`
    :`<span class="badge b-warn">중도금 유이자 ${s.loanRatio}%</span>`;
}
function dpBadge(g){
  const m={A:'b-green',B:'b-green',C:'b-warn',D:'b-danger'};
  return `<span class="badge ${m[g]||'b-n'}">계약금 ${g}등급</span>`;
}
function regBadge(s){
  return s.regulated
    ?`<span class="badge b-danger">규제지역</span>`
    :`<span class="badge b-n">비규제</span>`;
}

/* ── KPI ── */
function renderKPI(arr){
  const n=arr.length;
  const tu=arr.reduce((a,s)=>a+s.units,0);
  const wp=n?Math.round(arr.reduce((a,s)=>a+s.avgPyeong*s.units,0)/tu):0;
  const ak=n?Math.round(arr.reduce((a,s)=>a+s.kookmin84Ratio,0)/n):0;
  document.getElementById('kN').innerHTML=`${fmt(n)}<span class="kpi-unit">개</span>`;
  document.getElementById('kU').innerHTML=`${fmt(tu)}<span class="kpi-unit">세대</span>`;
  document.getElementById('kP').innerHTML=`${fmt(wp)}<span class="kpi-unit">만/평</span>`;
  document.getElementById('kK').innerHTML=`${fmt(ak)}<span class="kpi-unit">%</span>`;
}

/* ── Chart (지역 선택 시에만) ── */
function renderChart(arr){
  const sec=document.getElementById('chartSec');
  // 전체 선택 시 차트 숨김
  if(!activeSido || arr.length<2){sec.style.display='none';return;}
  sec.style.display='';

  const sorted=[...arr].sort((a,b)=>{
    const da=a.noticeDate||a.moveIn||'';
    const db=b.noticeDate||b.moveIn||'';
    return da.localeCompare(db);
  });
  document.getElementById('chartSub').textContent=
    `공고일 순 · ${activeSido} · ${sorted.length}개 현장`;

  const labels=sorted.map(s=>s.name.length>8?s.name.slice(0,8)+'…':s.name);
  const vals=sorted.map(s=>s.avgPyeong);
  const n=vals.length;
  const xi=vals.map((_,i)=>i);
  const mx=xi.reduce((a,v)=>a+v,0)/n, my=vals.reduce((a,v)=>a+v,0)/n;
  const den=xi.reduce((a,v)=>a+(v-mx)**2,0)||1;
  const sl=xi.reduce((a,v,i)=>a+(v-mx)*(vals[i]-my),0)/den;
  const ic=my-sl*mx;
  const trend=xi.map(v=>Math.round(sl*v+ic));

  if(typeof Chart==='undefined'){renderChartSVG(sorted,labels,vals,trend);return;}

  if(!document.getElementById('ppChart'))
    document.getElementById('chartBox').innerHTML='<canvas id="ppChart"></canvas>';

  const ctx=document.getElementById('ppChart').getContext('2d');
  if(chartInst)chartInst.destroy();
  chartInst=new Chart(ctx,{
    data:{labels,datasets:[
      {type:'bar',label:'평당분양가',data:vals,
        backgroundColor:'rgba(0,113,227,.12)',borderColor:'rgba(0,113,227,.55)',
        borderWidth:1.5,borderRadius:6,borderSkipped:false,yAxisID:'y'},
      {type:'line',label:'추세선',data:trend,
        borderColor:'#ff453a',borderWidth:2,borderDash:[6,4],
        pointRadius:4,pointBackgroundColor:'#ff453a',
        pointBorderColor:'#fff',pointBorderWidth:2,
        tension:0,fill:false,yAxisID:'y'}
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#fff',borderColor:'#e5e5e7',borderWidth:1,
          titleColor:'#1d1d1f',bodyColor:'#6e6e73',padding:12,
          callbacks:{label:c=>`${c.dataset.label}: ${fmt(c.parsed.y)}만/평`}
        }
      },
      scales:{
        x:{ticks:{font:{family:'Pretendard',size:11},color:'#6e6e73',maxRotation:30},
           grid:{display:false},border:{display:false}},
        y:{ticks:{font:{family:'Pretendard',size:11},color:'#6e6e73',
             callback:v=>fmt(v)+'만'},
           grid:{color:'rgba(0,0,0,0.04)'},border:{display:false}}
      }
    }
  });
}

/* SVG fallback */
function renderChartSVG(sorted,labels,vals,trend){
  const PAD={top:20,right:16,bottom:60,left:60};
  const bw=Math.max(24,Math.min(52,Math.floor(700/sorted.length)-8));
  const W=Math.max(500,sorted.length*(bw+8)+PAD.left+PAD.right);
  const H=200,pw=W-PAD.left-PAD.right,ph=H-PAD.top-PAD.bottom;
  const mn=Math.min(...vals)*.96,mx=Math.max(...vals)*1.04;
  const ys=v=>(1-(v-mn)/(mx-mn))*ph;
  const xc=i=>PAD.left+i*(bw+8)+bw/2+4;
  const bars=vals.map((v,i)=>{
    const cy=ys(v),bh=ph-cy,x=PAD.left+i*(bw+8)+4;
    return `<rect x="${x}" y="${PAD.top+cy}" width="${bw}" height="${bh}"
      fill="rgba(0,113,227,.12)" stroke="rgba(0,113,227,.5)" stroke-width="1.2" rx="4"/>
      <text x="${x+bw/2}" y="${PAD.top+cy-5}" text-anchor="middle"
        font-size="9" fill="#0071e3" font-family="Pretendard,sans-serif">${fmt(v)}</text>`;
  }).join('');
  const tpts=trend.map((v,i)=>`${xc(i)},${PAD.top+ys(v)}`).join(' ');
  const xl=labels.map((lb,i)=>{
    const x=xc(i),y=PAD.top+ph+14;
    return `<text x="${x}" y="${y}" text-anchor="end" transform="rotate(-30,${x},${y})"
      font-size="10" fill="#6e6e73" font-family="Pretendard,sans-serif">${lb}</text>`;
  }).join('');
  document.getElementById('chartBox').innerHTML=
    `<div style="overflow-x:auto"><svg xmlns="http://www.w3.org/2000/svg"
      width="${W}" height="${H}" style="min-width:${W}px;overflow:visible">
      ${bars}
      <polyline points="${tpts}" fill="none" stroke="#ff453a" stroke-width="2" stroke-dasharray="6,4"/>
      ${xl}</svg></div>`;
}

/* ── Chips ── */
function renderChips(){
  const sidos=[...new Set(ALL.map(s=>s.sido))]
    .sort((a,b)=>ALL.filter(x=>x.sido===b).length-ALL.filter(x=>x.sido===a).length);
  document.getElementById('chips').innerHTML=
    `<button class="chip${activeSido===''?' active':''}" data-sido="">전체</button>`+
    sidos.map(s=>{
      const cnt=ALL.filter(x=>x.sido===s).length;
      return `<button class="chip${activeSido===s?' active':''}" data-sido="${s}">${s} <span style="opacity:.55;font-size:12px">${cnt}</span></button>`;
    }).join('');
  document.getElementById('chips').querySelectorAll('.chip').forEach(b=>{
    b.addEventListener('click',()=>{activeSido=b.dataset.sido;renderAll();});
  });
}

/* ── Cards ── */
function renderCards(arr){
  const grid=document.getElementById('grid');
  if(!arr.length){grid.innerHTML='<div class="empty">조건에 맞는 현장이 없습니다.</div>';return;}
  grid.innerHTML=arr.map(s=>`
    <a class="site-card" href="site.html?id=${s.id}">
      <div class="c-loc">
        <span>${s.sido}</span><span style="color:var(--divider)">·</span>
        <span>${s.sigungu}</span>
        ${s.district?`<span style="color:var(--divider)">·</span><span>${s.district}</span>`:''}
      </div>
      <div class="c-name">${s.name}</div>
      <div class="c-stats">
        <div><div class="cs-label">평균 평당가</div>
          <div class="cs-val">${fmt(s.avgPyeong)}<span class="cs-unit">만</span></div></div>
        <div><div class="cs-label">총 세대수</div>
          <div class="cs-val">${fmt(s.units)}<span class="cs-unit">세대</span></div></div>
        <div><div class="cs-label">국민평형 비중</div>
          <div class="cs-val">${s.kookmin84Ratio}<span class="cs-unit">%</span></div></div>
        <div><div class="cs-label">입주 예정</div>
          <div class="cs-val" style="font-size:17px;letter-spacing:-.2px">${s.moveIn}</div></div>
      </div>
      <div class="c-chips">
        ${regBadge(s)}${loanBadge(s)}${dpBadge(s.downPaymentGrade)}
        <span class="badge b-n">풀옵션 ${s.fullOptionRatio}%</span>
      </div>
    </a>`).join('');
}

/* ── Sort ── */
function getSorted(arr,sort){
  const m={
    'pp-asc':(a,b)=>a.avgPyeong-b.avgPyeong,
    'pp-desc':(a,b)=>b.avgPyeong-a.avgPyeong,
    'units-desc':(a,b)=>b.units-a.units,
    'kookmin-desc':(a,b)=>b.kookmin84Ratio-a.kookmin84Ratio,
    'movein-asc':(a,b)=>(a.moveIn||'').localeCompare(b.moveIn||''),
  };
  return [...arr].sort(m[sort]||m['pp-asc']);
}

/* ── Main ── */
function renderAll(){
  const q=document.getElementById('fSearch').value.trim();
  const sort=document.getElementById('fSort').value;
  const filtered=ALL.filter(s=>
    (!activeSido||s.sido===activeSido)&&(!q||s.name.includes(q)));
  const sorted=getSorted(filtered,sort);
  renderChips();
  renderKPI(filtered);
  try{renderChart(filtered);}catch(e){console.warn('chart err',e);document.getElementById('chartSec').style.display='none';}
  renderCards(sorted);
  document.getElementById('resCnt').textContent=`${sorted.length} / ${ALL.length}개 현장`;
}

/* ── Init ── */
fetch('data/index.json').then(r=>r.json()).then(d=>{
  ALL=d.sites||[];
  document.getElementById('hdMeta').textContent=`최종 갱신 ${d.updated||'—'} · ${ALL.length}개 현장`;
  renderAll();
  ['fSearch','fSort'].forEach(id=>document.getElementById(id).addEventListener('input',renderAll));
}).catch(()=>{
  document.getElementById('hdMeta').textContent='⚠ 데이터 로드 실패 — GitHub Pages에서 확인하세요.';
});
</script>
</body>
</html>
